---
name: Multi-Stack Pipeline
on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
jobs:
  lint-python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: '${{ runner.os }}-pip-

            '
      - name: Install dependencies
        run: 'python -m pip install --upgrade pip

          pip install -r requirements.txt

          '
      - name: Run linter
        run: python -m pip install black && black --check .
    defaults:
      run:
        working-directory: backend
  test-python:
    needs:
      - lint-python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: '${{ runner.os }}-pip-

            '
      - name: Install dependencies
        run: 'python -m pip install --upgrade pip

          pip install -r requirements.txt

          '
      - name: Run tests
        run: python -m pip install pytest pytest-cov && pytest
    defaults:
      run:
        working-directory: backend
  docker-build-python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: 'docker build -t ${{ github.repository }}:${{ github.sha }} .

          docker tag ${{ github.repository }}:${{ github.sha }} ${{ github.repository
          }}:latest

          '
      - name: Verify image
        run: docker images ${{ github.repository }}
    defaults:
      run:
        working-directory: backend
  lint-node:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: '${{ runner.os }}-pip-

            '
      - name: Install dependencies
        run: 'if [ -f package-lock.json ]; then npm ci; else npm install; fi

          '
      - name: Run linter
        run: npm run lint
    defaults:
      run:
        working-directory: frontend
  test-node:
    needs:
      - lint-node
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: '${{ runner.os }}-pip-

            '
      - name: Install dependencies
        run: 'npm ci

          '
      - name: Run tests
        run: npm test
    defaults:
      run:
        working-directory: frontend
  docker-build-node:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: 'docker build -t ${{ github.repository }}:${{ github.sha }} .

          docker tag ${{ github.repository }}:${{ github.sha }} ${{ github.repository
          }}:latest

          '
      - name: Verify image
        run: docker images ${{ github.repository }}
    defaults:
      run:
        working-directory: frontend
  test-php:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json
          coverage: none
      - name: Install dependencies
        run: 'composer config policy.advisories.block false || true

          composer install --no-interaction --prefer-dist

          '
      - name: Prepare Laravel Application
        run: 'cp .env.example .env 2>/dev/null || echo "APP_KEY=" > .env

          if [ -f artisan ]; then php artisan key:generate --force; fi

          '
      - name: Run tests
        run: if [ -f artisan ]; then php artisan test; else vendor/bin/phpunit; fi
    defaults:
      run:
        working-directory: services/mailer
  docker-build-php:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: 'docker build -t ${{ github.repository }}:${{ github.sha }} .

          docker tag ${{ github.repository }}:${{ github.sha }} ${{ github.repository
          }}:latest

          '
      - name: Verify image
        run: docker images ${{ github.repository }}
    defaults:
      run:
        working-directory: services/mailer
