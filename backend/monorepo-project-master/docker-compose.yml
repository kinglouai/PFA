version: "3.9"
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - MAILER_URL=http://mailer:8080
    depends_on:
      - backend
      - mailer

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DATABASE_URL=sqlite:///db.sqlite3

  mailer:
    build: ./services/mailer
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_KEY=base64:testkey==
